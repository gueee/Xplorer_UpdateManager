##################################################################

[printer]
kinematics: cartesian

##################################################################

##################################
# Z Stepper Align
##################################

[z_tilt]
z_positions: -60.1, -3.9
               210, 537.5
              481.1, -3.9

points: 80, 40
        210, 360
        340, 40

speed: 250
horizontal_move_z: 7
retries: 10
retry_tolerance: 0.025

##################################
# Bed Mesh (Cartographer optimized)
##################################

[bed_mesh]
zero_reference_position: 180, 195
speed: 250
horizontal_move_z: 5
mesh_min: 20, 25
mesh_max: 340, 370
probe_count: 20, 20
mesh_pps: 0, 0
algorithm: bicubic
bicubic_tension: 0.2
move_check_distance: 5
split_delta_z: .025
fade_start: 1
fade_end: 10
fade_target: 0
