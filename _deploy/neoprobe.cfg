###################################
# Brush overrides (CB2-safe, reduced move count)
###################################

[gcode_macro Brush_Tool0]
gcode:
    {% set svv = printer.save_variables.variables %}
    M118 Brushing Tool0
    G90
    Tool0
    G1 Z10 F2000
    G0 X94 Y405 Z{svv.h_brush} F9000
    G1 F5000
    {% for i in range(4) %}
        G1 X129 Y405
        G1 X94 Y405
    {% endfor %}
    G0 Z10 F2000
    M400

[gcode_macro Brush_Tool1]
gcode:
    {% set svv = printer.save_variables.variables %}
    M118 Brushing Tool1
    G90
    G1 Z10 F2000
    Tool1
    G0 X294 Y405 Z{svv.h_brush} F9000
    G1 F5000
    {% for i in range(4) %}
        G1 X329 Y405
        G1 X294 Y405
    {% endfor %}
    G0 Z10 F2000
    M400
