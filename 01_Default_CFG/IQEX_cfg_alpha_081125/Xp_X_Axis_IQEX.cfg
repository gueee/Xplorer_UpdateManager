##################################
# Axis X -- Carriage Tool0
##################################

[carriage t0]
axis: x
gantry: gantry0
endstop_pin:~Tool0:PB6
position_min: -1
position_endstop: 0
position_max: 340
homing_speed: 180
homing_retract_dist: 5.0
homing_retract_speed: 50
second_homing_speed: 10
#homing_positive_dir:

[stepper x]
carriages: t0
step_pin: PB8 # BTT M8P V2.0 // PD7 #BTT M8P V1.1
dir_pin: PB7  # BTT M8P V2.0 // PD6 #BTT M8P V1.1
enable_pin: !PE0 # BTT M8P V2.0 // !PF10 #BTT M8P V1.1
microsteps: 64 #32
rotation_distance: 31.93                     #Califlower Calibration https://www.printables.com/model/682023-califlower-calibration-stl-calculator                    

[tmc2209 stepper x]
uart_pin: PB9 # BTT M8P V2.0 // PF9 #BTT M8P V1.1
run_current: 0.95
interpolate: false
hold_current: 0.500
sense_resistor: 0.11 
stealthchop_threshold: 0
driver_TBL: 2
driver_TOFF: 3
driver_HEND: 2
driver_HSTRT: 0

##################################
# Axis X -- Carriage Tool1
##################################

[dual_carriage t1]
primary_carriage: t0
#safe_distance:
endstop_pin: ~Tool1:PB6 
position_min: 80
position_endstop: 421 
position_max: 422
homing_speed: 180
homing_retract_dist: 5.0
homing_retract_speed: 50
second_homing_speed: 10
#homing_positive_dir:

[stepper x1]
