##################################
# Axis Y --
#################################
#       BACK side of the printer    ##
#                                   ##
#       Y                   Y1      ##
#                                   ##
#       LEFT side of the printer    ##


#  Right side of the printer  ##

[stepper_y]                      
step_pin: PF9 # BTT Octopus PRO
dir_pin: PF10 # BTT Octopus PRO
enable_pin: !PG2 # BTT Octopus PRO
microsteps: 32
rotation_distance: 40            
endstop_pin: ~PG11 # BTT Octopus PRO
position_endstop: 449
position_max: 450
position_min: 0
homing_speed: 150
homing_retract_dist: 5.0
homing_retract_speed: 50
second_homing_speed: 10

[tmc2209 stepper_y]
uart_pin: PF2 # BTT Octopus PRO
run_current: 1.5
interpolate: true
hold_current: 0.4
stealthchop_threshold: 350

#  Left side of the printer  ###

[stepper_y1]                       # Left side of the printer
step_pin: PG4 # BTT Octopus PRO
dir_pin: PC1  # BTT Octopus PRO
enable_pin: !PA0 # BTT Octopus PRO
microsteps: 32
rotation_distance: 40

[tmc2209 stepper_y1]
uart_pin: PC7 # BTT Octopus PRO
run_current: 1.5
interpolate: true
hold_current: 0.4
stealthchop_threshold: 350

