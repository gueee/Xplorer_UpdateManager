   {%endif%}
    {%if svv.pmode == 2%}
     M118 T1 MIRROR T0 Printing Mode is activated for the next print!
   {%endif%}
   {%if svv.pmode == 3%}
     M118 T1,T2, T3 COPY T0 Printing Mode is activated for the next print!
   {%endif%}
   {%if svv.pmode == 4%}
