##################################
# Specs Xplorer 
##################################

[printer]
max_velocity: 300
max_accel: 5000 
max_z_velocity: 40
max_z_accel: 100
minimum_cruise_ratio: 0.5
square_corner_velocity: 5.0

##################################
#  Xplorer specific modules
##################################

[xplorer]               # imports the py modules for the Xplorer into klippy/extras

[trsync_patch]          # when 'True' it increases TRSYNC_TIMEOUT to 0.050 (Klipper default is 0.025) in order to avoid communication errors between the MCUs and the host.
enabled: True

##################################
# Folder to save variables
##################################

[save_variables]
filename:~/printer_data/config/variables.cfg

##################################
# Force Move 
##################################

[force_move]
enable_force_move: True

##################################
# Input Shaper
##################################

[input_shaper]

##################################
# Calibrate endstop phases
##################################

[endstop_phase]

##################################
# Support SDCard looping
##################################

[sdcard_loop]

##################################
# Exclude Objects
##################################

[exclude_object]

##################################
# Enable skew correction
##################################

[skew_correction] 

##################################
# Enable arcs support
##################################

[gcode_arcs]
resolution: 0.5

##################################
# idle timeout
##################################

[idle_timeout]
TIMEOUT: 3600 #1 hour

##################################
# Respond
##################################

[respond]
default_type: echo

##################################
# Temperature Sensors
##################################

[temperature_sensor Mainboard]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor Host]
sensor_type: temperature_host

##################################
# Temperature Fans
##################################

[temperature_fan chamber_fan]
pin: PA8 # BTT Octopus PRO
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
cycle_time:0.01
off_below:0.1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF4 # BTT Octopus PRO
min_temp: 0
target_temp:40
max_temp: 65
control: watermark
gcode_id: C

[controller_fan Mainboard_fan]
pin: PE5 # BTT Octopus PRO
max_power: 1.0
shutdown_speed: 0
fan_speed: 1.0
idle_timeout: 60

##################################
# Print bed
##################################

[heater_bed]
heater_pin: PA2 # BTT Octopus PRO                    
sensor_type: Generic 3950
sensor_pin: PF3 # BTT Octopus PRO                      
min_temp: 0
max_temp: 125

[verify_heater heater_bed]
max_error: 10
check_gain_time: 120
hysteresis: 2


##################################
# Case light
##################################

[output_pin caselight]
pin: PA3 # BTT Octopus PRO
pwm:true
cycle_time: 0.01
value: 1
shutdown_value: 0

##################################
# Power ON/OFF
##################################

[output_pin Power]
pin: PE11 # BTT Octopus PRO
value: 1