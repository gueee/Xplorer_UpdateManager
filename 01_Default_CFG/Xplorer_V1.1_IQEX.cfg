##################################################################

[printer]
kinematics: generic_cartesian

##################################################################

##################################
# Z Stepper Align
##################################

[z_tilt]
z_positions: -60.1, -3.9            # Z Belt position relativ to origin  (left Z Motor)
               210, 537.5           # Z1 Belt position relativ to origin (back Z Motor)          
              481.1, -3.9           # Z2 Belt position relativ to origin (right Z Motor) 
              

points: 80, 130      # probing point left Z Motor
        210, 360    # probing point back Z Motor       
        340, 130     # probing point right Z Motor 
       

speed: 200
horizontal_move_z: 7
retries: 10
retry_tolerance: 0.025

##################################
# Bed Mesh
##################################

[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 20, 92
mesh_max: 340, 380         
probe_count: 8,8 
mesh_pps: 3, 3
algorithm: bicubic 
bicubic_tension: 0.2
move_check_distance: 5
split_delta_z: .025
fade_start: 1
fade_end: 10
fade_target: 0                                             


[controller_fan Expansion_fan]
pin: mcu2:gpio9 # BTT PICO
max_power: 1.0
shutdown_speed: 0
fan_speed: 1.0
idle_timeout: 60